<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — Flow State Technologies</title>
<style>
  :root{--ink:#0C1E24;--paper:#F7FAF9;--tide:#0F5E5C;--surf:#3E9B93;--fog:#5F7A77;}
  *{box-sizing:border-box;margin:0}
  body{min-height:100vh;display:grid;place-content:center;text-align:center;
    background:var(--paper);color:var(--ink);padding:2rem;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;}
  .code{font-size:clamp(3rem,12vw,6rem);font-weight:800;letter-spacing:-0.04em;
    background:linear-gradient(100deg,var(--tide),var(--surf));
    -webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
  h1{font-size:1.4rem;margin:0.75rem 0 0.5rem;letter-spacing:-0.02em;}
  p{color:var(--fog);max-width:42ch;margin:0 auto 1.75rem;}
  a{display:inline-flex;align-items:center;gap:.5rem;background:var(--tide);color:#fff;
    text-decoration:none;font-weight:700;font-size:.95rem;padding:.7rem 1.2rem;border-radius:999px;}
  a:hover{background:#0A4442}
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>This page drifted off course.</h1>
    <p>The page you're looking for isn't here. It may have moved, or the link may be off.</p>
    <a href="/">← Back to home</a>
  </div>
</body>
</html>
